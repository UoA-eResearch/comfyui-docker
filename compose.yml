---

name: comfyui-docker

services:
  comfyui:
    image: comfyui-docker:${IMAGE_TAG:-latest}
    container_name: comfyui
    restart: unless-stopped
    environment:
      USER_ID: "${USER_ID:-1000}"
      GROUP_ID: "${GROUP_ID:-1000}"
    ports:
      - "8188:8188"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
